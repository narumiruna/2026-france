<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>France Food Map</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css"
    />
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css"
    />
    <link rel="stylesheet" href="./assets/style.css" />
  </head>
  <body>
    <header class="site-header">
      <h1>France Food Map 2026</h1>
      <p>旅程城市總覽與即時附近餐廳地圖</p>
      <nav class="tabs" aria-label="主要分頁">
        <button class="tab is-active" data-tab="overview" type="button">Overview</button>
        <button class="tab" data-tab="map" type="button">Map</button>
      </nav>
    </header>

    <main class="container">
      <section id="overview" class="panel is-active" aria-label="城市美食總覽">
        <div id="overview-list" class="overview-grid"></div>
      </section>

      <section id="map" class="panel" aria-label="地圖頁面">
        <div class="map-meta">
          <p id="map-status">載入中...</p>
          <p class="meta">附近定義：2 公里</p>
        </div>
        <div id="map-view"></div>
      </section>
    </main>

    <template id="overview-card-template">
      <article class="city-card">
        <div class="city-head">
          <h2 class="city-name"></h2>
          <p class="city-period"></p>
        </div>
        <p class="city-notes"></p>
        <div class="city-block">
          <h3>美食亮點</h3>
          <ul class="city-highlights"></ul>
        </div>
        <div class="city-block">
          <h3>代表料理</h3>
          <ul class="city-dishes"></ul>
        </div>
        <div class="city-block">
          <h3>重點區域</h3>
          <ul class="city-areas"></ul>
        </div>
        <div class="city-block">
          <h3>注意事項</h3>
          <ul class="city-constraints"></ul>
        </div>
        <button class="go-map" type="button">在地圖查看</button>
      </article>
    </template>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
    <script src="./assets/app.js" defer></script>
  </body>
</html>
