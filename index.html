<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>France Food Map 2026</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&family=Playfair+Display:wght@600;700&display=swap"
    />
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css"
    />
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css"
    />
    <link rel="stylesheet" href="./assets/style.css" />
  </head>
  <body>
    <header class="site-header">
      <div class="header-inner">
        <div class="header-title-group">
          <span class="header-flag" aria-hidden="true">🇫🇷</span>
          <div>
            <h1>France Food Map <span class="header-year">2026</span></h1>
            <p class="header-sub">旅程城市總覽與即時附近餐廳地圖</p>
          </div>
        </div>
        <nav class="tabs" aria-label="主要分頁">
          <button class="tab is-active" data-tab="overview" type="button">
            <span class="tab-icon" aria-hidden="true">🗺</span> 總覽
          </button>
          <button class="tab" data-tab="top-picks" type="button">
            <span class="tab-icon" aria-hidden="true">⭐</span> 精選
          </button>
          <button class="tab" data-tab="map" type="button">
            <span class="tab-icon" aria-hidden="true">📍</span> 地圖
          </button>
        </nav>
      </div>
    </header>

    <div class="trip-banner" id="trip-banner"></div>

    <main class="main-layout">
      <div class="container">
        <section id="overview" class="panel is-active" aria-label="城市美食總覽">
          <div id="overview-list" class="overview-grid"></div>
        </section>

        <section id="top-picks" class="panel" aria-label="各城市精選餐廳">
          <div id="top-picks-list"></div>
        </section>
      </div>

      <section id="map" class="panel" aria-label="地圖頁面">
        <aside class="map-sidebar">
          <div class="map-meta">
            <p id="map-status">載入中...</p>
            <button id="go-to-location" class="go-to-location" type="button">
              <span aria-hidden="true">📍</span> 跳到目前位置
            </button>
          </div>
          <div id="map-sidebar-list" class="map-sidebar-list"></div>
        </aside>
        <div id="map-view"></div>
      </section>
    </main>

    <footer class="site-footer">
      <p>France Food Map 2026 &nbsp;·&nbsp; 資料僅供旅遊參考</p>
      <div class="footer-cities" aria-hidden="true">🏛 🌊 🏰 🗼</div>
    </footer>

    <template id="overview-card-template">
      <article class="city-card">
        <div class="city-head">
          <div class="city-head-left">
            <span class="city-emoji" aria-hidden="true"></span>
            <h2 class="city-name"></h2>
          </div>
          <div class="city-head-right">
            <span class="city-rest-count" title="餐廳候選數"></span>
            <p class="city-period"></p>
          </div>
        </div>
        <p class="city-notes"></p>
        <div class="city-block">
          <h3><span aria-hidden="true">✨</span> 美食亮點</h3>
          <ul class="city-highlights"></ul>
        </div>
        <div class="city-block">
          <h3><span aria-hidden="true">🍽</span> 代表料理</h3>
          <ul class="city-dishes"></ul>
        </div>
        <div class="city-block">
          <h3><span aria-hidden="true">📌</span> 重點區域</h3>
          <ul class="city-areas"></ul>
        </div>
        <div class="city-block">
          <h3><span aria-hidden="true">🏨</span> 住宿</h3>
          <p class="city-hotel"></p>
        </div>
        <div class="city-block">
          <h3><span aria-hidden="true">⚠️</span> 注意事項</h3>
          <ul class="city-constraints"></ul>
        </div>
        <button class="go-map" type="button">
          <span aria-hidden="true">🗺</span> 在地圖查看
        </button>
      </article>
    </template>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
    <script src="./assets/app.js" defer></script>
  </body>
</html>
